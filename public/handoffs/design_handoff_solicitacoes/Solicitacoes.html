<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Módulo de Solicitações — elo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============================ TOKENS ============================ */
:root {
  --accent: 184 100% 33%;        /* teal #00a5a7 do cristal */
  --accent-fg: 0 0% 100%;
  --radius: 12px;
  --sidebar-w: 248px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.06);
  --font: "Geist", system-ui, -apple-system, sans-serif;
  --mono: "Geist Mono", ui-monospace, monospace;
}
:root[data-theme="dark"] {
  --bg: 0 0% 4%;
  --bg-deep: 0 0% 2.5%;
  --panel: 0 0% 6.5%;
  --card: 0 0% 8.5%;
  --card-2: 0 0% 11%;
  --border: 0 0% 16%;
  --border-soft: 0 0% 12%;
  --text: 0 0% 98%;
  --muted: 0 0% 64%;
  --faint: 0 0% 44%;
  --ring: 0 0% 80%;
  --glow-a: 0 72% 45%;     /* vermelho */
  --glow-b: 158 64% 40%;   /* verde */
  --glow-op: .22;
  --shadow: 0 8px 30px rgba(0,0,0,.45);
}
:root[data-theme="light"] {
  --bg: 0 0% 97.5%;
  --bg-deep: 0 0% 95%;
  --panel: 0 0% 100%;
  --card: 0 0% 100%;
  --card-2: 0 0% 98%;
  --border: 0 0% 90%;
  --border-soft: 0 0% 93.5%;
  --text: 0 0% 9%;
  --muted: 0 0% 40%;
  --faint: 0 0% 55%;
  --ring: 0 0% 20%;
  --glow-a: 0 72% 60%;
  --glow-b: 158 54% 50%;
  --glow-op: .10;
  --shadow: 0 6px 24px rgba(0,0,0,.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: hsl(var(--bg-deep));
  color: hsl(var(--text));
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-size: 14px;
  line-height: 1.45;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; }
::selection { background: hsl(var(--accent) / .3); }

/* scrollbars */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: hsl(var(--border)); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
*::-webkit-scrollbar-thumb:hover { background: hsl(0 0% 30%); background-clip: padding-box; }

/* ============================ SHELL ============================ */
.app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  height: 100vh;
  overflow: hidden;
}
.app.collapsed { grid-template-columns: 0 1fr; }

/* ambient identity glow */
.glow {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(60% 55% at 92% 8%, hsl(var(--glow-a) / var(--glow-op)), transparent 60%),
    radial-gradient(55% 60% at 6% 96%, hsl(var(--glow-b) / var(--glow-op)), transparent 62%);
  transition: opacity .4s ease;
}

/* sidebar */
.sidebar {
  background: hsl(var(--bg) / .82);
  border-right: 1px solid hsl(var(--border-soft));
  display: flex; flex-direction: column;
  position: relative; z-index: 3;
  overflow: hidden;
  backdrop-filter: blur(8px);
}
.brand { display: flex; align-items: center; gap: 10px; padding: 22px 22px 26px; }
.brand .glyph {
  width: 30px; height: 30px; display: grid; place-items: center;
  color: hsl(var(--text));
}
.brand .word { font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
.nav { padding: 4px 12px; overflow-y: auto; flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 12px; border-radius: 9px; color: hsl(var(--muted));
  font-size: 14px; font-weight: 500; width: 100%; text-align: left;
  transition: background .15s, color .15s;
}
.nav-item:hover { background: hsl(var(--card)); color: hsl(var(--text)); }
.nav-item .chev { margin-left: auto; opacity: .5; transition: transform .2s; }
.nav-group.open > .nav-item { color: hsl(var(--text)); }
.nav-group.open > .nav-item .chev { transform: rotate(90deg); }
.nav-item.active { background: hsl(var(--card-2)); color: hsl(var(--text)); }
.subnav { padding-left: 16px; margin: 2px 0 4px; display: flex; flex-direction: column; gap: 1px; }
.subnav .nav-item { padding: 7px 12px; font-size: 13.5px; }
.subnav .nav-item.active {
  color: hsl(var(--text)); background: hsl(var(--card-2));
  box-shadow: inset 2px 0 0 hsl(var(--accent));
}
.sidebar-foot { padding: 12px; border-top: 1px solid hsl(var(--border-soft)); display: flex; flex-direction: column; gap: 1px; }

/* header */
.main { position: relative; z-index: 2; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.topbar {
  height: 60px; flex-shrink: 0;
  display: flex; align-items: center; gap: 16px;
  padding: 0 22px;
  border-bottom: 1px solid hsl(var(--border-soft));
  background: hsl(var(--bg) / .65);
  backdrop-filter: blur(10px);
  position: relative; z-index: 5;
}
.topbar .org { font-weight: 700; font-size: 15px; letter-spacing: -.01em; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center;
  color: hsl(var(--muted)); transition: background .15s, color .15s;
}
.icon-btn:hover { background: hsl(var(--card)); color: hsl(var(--text)); }
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, hsl(var(--accent)), hsl(var(--accent) / .6));
  display: grid; place-items: center; color: #fff; font-weight: 600; font-size: 13px;
}

/* layout switch button (the headline feature) */
.layout-switch {
  display: inline-flex; align-items: center; gap: 8px;
  height: 34px; padding: 0 13px; border-radius: 9px;
  font-size: 13px; font-weight: 600;
  border: 1px solid hsl(var(--border));
  background: hsl(var(--card));
  color: hsl(var(--text));
  transition: all .18s;
}
.layout-switch:hover { border-color: hsl(var(--accent) / .6); }
.layout-switch.on {
  background: hsl(var(--accent) / .14);
  border-color: hsl(var(--accent) / .5);
  color: hsl(var(--accent));
}
:root[data-theme="light"] .layout-switch.on { color: hsl(184 100% 26%); }
.layout-switch .pip {
  width: 26px; height: 15px; border-radius: 99px; background: hsl(var(--border));
  position: relative; transition: background .2s;
}
.layout-switch.on .pip { background: hsl(var(--accent)); }
.layout-switch .pip::after {
  content: ""; position: absolute; top: 2px; left: 2px;
  width: 11px; height: 11px; border-radius: 50%; background: #fff;
  transition: transform .2s;
}
.layout-switch.on .pip::after { transform: translateX(11px); }
.beta {
  font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  padding: 2px 5px; border-radius: 5px; background: hsl(var(--accent) / .16); color: hsl(var(--accent));
}
:root[data-theme="light"] .beta { color: hsl(184 100% 26%); }

/* content scroll area */
.content { flex: 1; overflow-y: auto; position: relative; }
.content-inner { padding: 30px 34px 80px; max-width: 1380px; margin: 0 auto; }

/* role segmented control */
.seg {
  display: inline-flex; padding: 3px; border-radius: 10px;
  background: hsl(var(--card)); border: 1px solid hsl(var(--border-soft)); gap: 2px;
}
.seg button {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 14px; border-radius: 7px; font-size: 13px; font-weight: 600;
  color: hsl(var(--muted)); transition: all .15s;
}
.seg button.active { background: hsl(var(--card-2)); color: hsl(var(--text)); box-shadow: var(--shadow-sm); }

/* generic atoms */
.h-title { font-size: 28px; font-weight: 700; letter-spacing: -.025em; }
.h-sub { color: hsl(var(--muted)); font-size: 14.5px; margin-top: 4px; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  height: 38px; padding: 0 16px; border-radius: 9px; font-size: 13.5px; font-weight: 600;
  transition: all .16s; white-space: nowrap;
}
.btn-primary { background: hsl(var(--text)); color: hsl(var(--bg)); }
.btn-primary:hover { opacity: .9; }
.btn-accent { background: hsl(var(--accent)); color: #fff; }
.btn-accent:hover { filter: brightness(1.06); }
.btn-ghost { border: 1px solid hsl(var(--border)); background: hsl(var(--card)); color: hsl(var(--text)); }
.btn-ghost:hover { border-color: hsl(var(--muted) / .6); }
.btn-sm { height: 32px; padding: 0 12px; font-size: 12.5px; border-radius: 8px; }

.card {
  background: hsl(var(--card) / .9);
  border: 1px solid hsl(var(--border-soft));
  border-radius: var(--radius);
  backdrop-filter: blur(6px);
}
.pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 9px; border-radius: 99px; font-size: 11.5px; font-weight: 600;
  border: 1px solid hsl(var(--border));
}
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tone-neutral { color: hsl(var(--muted)); }
.tone-neutral .dot, .dot.neutral { background: hsl(0 0% 55%); }
.tone-active { color: hsl(38 92% 55%); background: hsl(38 92% 50% / .1); border-color: hsl(38 92% 50% / .25); }
.dot.active { background: hsl(38 92% 55%); }
.tone-done { color: hsl(158 64% 48%); background: hsl(158 64% 45% / .1); border-color: hsl(158 64% 45% / .25); }
.dot.done { background: hsl(158 64% 45%); }
.dot.high { background: hsl(0 72% 55%); }
.dot.medium { background: hsl(38 92% 55%); }
.dot.low { background: hsl(0 0% 50%); }
:root[data-theme="light"] .tone-active { color: hsl(32 90% 40%); }
:root[data-theme="light"] .tone-done { color: hsl(158 64% 32%); }

.kpi-strip { display: flex; flex-wrap: wrap; gap: 26px; }
.kpi { display: flex; flex-direction: column; gap: 2px; }
.kpi .v { font-size: 22px; font-weight: 700; letter-spacing: -.02em; font-family: var(--mono); }
.kpi .l { font-size: 12px; color: hsl(var(--muted)); font-weight: 500; }
.kpi .v.accent { color: hsl(var(--accent)); }
.kpi .v.warn { color: hsl(38 92% 55%); }
.kpi .v.danger { color: hsl(0 72% 58%); }

.muted { color: hsl(var(--muted)); }
.faint { color: hsl(var(--faint)); }
.mono { font-family: var(--mono); }
.sep { height: 1px; background: hsl(var(--border-soft)); }

.search {
  display: flex; align-items: center; gap: 9px;
  height: 40px; padding: 0 13px; border-radius: 10px;
  background: hsl(var(--card)); border: 1px solid hsl(var(--border-soft));
  color: hsl(var(--muted)); flex: 1; min-width: 0;
}
.search input { flex: 1; background: none; border: none; outline: none; color: hsl(var(--text)); font-size: 13.5px; }
.search input::placeholder { color: hsl(var(--faint)); }
.search:focus-within { border-color: hsl(var(--accent) / .5); }

.chip {
  padding: 6px 12px; border-radius: 99px; font-size: 12.5px; font-weight: 500;
  border: 1px solid hsl(var(--border-soft)); background: hsl(var(--card)); color: hsl(var(--muted));
  transition: all .14s; white-space: nowrap;
}
.chip:hover { color: hsl(var(--text)); border-color: hsl(var(--border)); }
.chip.active { background: hsl(var(--text)); color: hsl(var(--bg)); border-color: hsl(var(--text)); }

.fade-in { animation: fadeIn .3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

@media (max-width: 1080px) {
  .app { grid-template-columns: 0 1fr; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</body>
</html>
